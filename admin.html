<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Luxury Scents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #b8973a;
      --gold-light: #d4b45a;
      --black: #0a0908;
      --dark: #141210;
      --dark2: #1e1b18;
      --dark3: #2a2620;
      --mid: #5a5248;
      --warm-gray: #8a8178;
      --light: #f5f0e8;
      --cream: #faf7f0;
      --white: #ffffff;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Jost', sans-serif;
      --transition: 0.3s ease;
      --danger: #c0392b;
      --success: #2d6a3f;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--dark); color: var(--white); min-height: 100vh; }

    /* LOGIN GATE */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 32px;
      background: var(--dark);
      padding: 24px;
    }
    .login-card {
      background: var(--dark2);
      border: 1px solid rgba(184,151,58,0.2);
      border-radius: 6px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-logo { color: var(--gold); font-size: 14px; margin-bottom: 6px; }
    .login-title {
      font-family: var(--serif);
      font-size: 26px;
      font-weight: 300;
      color: var(--white);
      margin-bottom: 4px;
    }
    .login-sub { font-size: 13px; color: var(--warm-gray); margin-bottom: 28px; }
    .login-card label {
      display: block;
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--warm-gray);
      margin-bottom: 8px;
    }
    .login-card input {
      width: 100%;
      padding: 13px 16px;
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--white);
      font-family: var(--sans);
      font-size: 14px;
      border-radius: 4px;
      outline: none;
      margin-bottom: 20px;
      transition: border-color var(--transition);
    }
    .login-card input:focus { border-color: var(--gold); }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color: var(--black);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background var(--transition);
    }
    .login-btn:hover { background: var(--gold-light); }
    .login-error {
      font-size: 13px;
      color: #e05c5c;
      margin-top: 12px;
      min-height: 20px;
    }

    /* ADMIN LAYOUT */
    .admin-app { display: none; min-height: 100vh; }
    .admin-app.visible { display: block; }
    .admin-header {
      background: var(--dark);
      border-bottom: 1px solid rgba(184,151,58,0.15);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .admin-logo { display: flex; align-items: center; gap: 10px; }
    .admin-logo span:first-child { color: var(--gold); font-size: 12px; }
    .admin-logo span:last-child {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 400;
      color: var(--white);
    }
    .admin-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      background: rgba(184,151,58,0.15);
      color: var(--gold);
      border: 1px solid rgba(184,151,58,0.2);
      border-radius: 20px;
    }
    .logout-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--warm-gray);
      font-family: var(--sans);
      font-size: 12px;
      padding: 7px 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: all var(--transition);
    }
    .logout-btn:hover { border-color: var(--gold); color: var(--gold); }

    .admin-body {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 32px;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 32px;
      align-items: start;
    }

    /* ADD PRODUCT FORM */
    .add-panel {
      background: var(--dark2);
      border: 1px solid rgba(184,151,58,0.12);
      border-radius: 6px;
      padding: 28px;
      position: sticky;
      top: 90px;
    }
    .panel-title {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 400;
      color: var(--white);
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--warm-gray);
      margin-bottom: 7px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 12px 14px;
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--white);
      font-family: var(--sans);
      font-size: 14px;
      border-radius: 4px;
      outline: none;
      transition: border-color var(--transition);
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--gold); }
    .form-group select option { background: var(--dark3); }
    .add-btn {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color: var(--black);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 8px;
      transition: background var(--transition);
    }
    .add-btn:hover { background: var(--gold-light); }
    .form-msg { font-size: 13px; margin-top: 12px; min-height: 18px; }
    .form-msg.success { color: #5cb85c; }
    .form-msg.error { color: #e05c5c; }

    /* PRODUCTS LIST */
    .products-panel { }
    .products-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .products-panel-title {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 400;
      color: var(--white);
    }
    .product-count {
      font-size: 12px;
      color: var(--warm-gray);
    }
    .admin-product-list { display: flex; flex-direction: column; gap: 10px; }
    .admin-product-item {
      background: var(--dark2);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color var(--transition);
    }
    .admin-product-item:hover { border-color: rgba(184,151,58,0.25); }
    .admin-product-img {
      width: 56px; height: 56px;
      border-radius: 6px;
      background: var(--dark3);
      object-fit: cover;
      flex-shrink: 0;
    }
    .admin-product-info { flex: 1; }
    .admin-product-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--white);
      margin-bottom: 3px;
    }
    .admin-product-meta {
      font-size: 12px;
      color: var(--warm-gray);
    }
    .admin-product-price {
      font-family: var(--serif);
      font-size: 18px;
      color: var(--gold-light);
      white-space: nowrap;
    }
    .delete-btn {
      padding: 8px 14px;
      background: transparent;
      border: 1px solid rgba(192,57,43,0.4);
      color: #e05c5c;
      font-family: var(--sans);
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all var(--transition);
    }
    .delete-btn:hover { background: rgba(192,57,43,0.15); border-color: #e05c5c; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--warm-gray);
      font-size: 14px;
    }

    @media (max-width: 800px) {
      .admin-body { grid-template-columns: 1fr; padding: 24px 16px; }
      .add-panel { position: static; }
    }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <p class="login-logo">✦</p>
      <h1 class="login-title">Admin Access</h1>
      <p class="login-sub">Enter your password to continue</p>
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
      <button class="login-btn" onclick="login()">Enter Dashboard</button>
      <p class="login-error" id="loginError"></p>
    </div>
  </div>

  <!-- ADMIN APP -->
  <div class="admin-app" id="adminApp">
    <header class="admin-header">
      <div class="admin-logo">
        <span>✦</span>
        <span>Luxury Scents</span>
        <span class="admin-badge">Admin</span>
      </div>
      <button class="logout-btn" onclick="logout()">Log Out</button>
    </header>

    <div class="admin-body">

      <!-- ADD PRODUCT -->
      <div class="add-panel">
        <h2 class="panel-title">Add New Product</h2>
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="pName" placeholder="e.g. Asad Midnight">
        </div>
        <div class="form-group">
          <label>Brand</label>
          <input type="text" id="pBrand" placeholder="e.g. Asad">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="pCategory">
            <option value="asad">Asad</option>
            <option value="lattafa">Lattafa</option>
            <option value="afnan">Afnan</option>
            <option value="fahkar">Fahkar</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Price (₦)</label>
          <input type="number" id="pPrice" placeholder="e.g. 35000">
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="text" id="pImage" placeholder="https://... or relative path">
        </div>
        <div class="form-group">
          <label>Short Description</label>
          <input type="text" id="pDesc" placeholder="e.g. Rich amber with oud base">
        </div>
        <div class="form-group">
          <label>Fragrance Notes (comma separated)</label>
          <input type="text" id="pNotes" placeholder="e.g. Oud, Amber, Musk">
        </div>
        <div class="form-group">
          <label>Badge (optional)</label>
          <input type="text" id="pBadge" placeholder="e.g. New In, Best Seller">
        </div>
        <button class="add-btn" onclick="addProduct()">Add Product</button>
        <p class="form-msg" id="formMsg"></p>
      </div>

      <!-- PRODUCT LIST -->
      <div class="products-panel">
        <div class="products-panel-header">
          <h2 class="products-panel-title">Manage Products</h2>
          <p class="product-count" id="productCount">0 products</p>
        </div>
        <div class="admin-product-list" id="adminProductList"></div>
      </div>

    </div>
  </div>

  <script>
    // Simple password gate — change "admin2025" to your own password
    const ADMIN_PASSWORD = "admin2025";
    const SESSION_KEY = "ls_admin_auth";

    function login() {
      const pw = document.getElementById("passwordInput").value;
      if (pw === ADMIN_PASSWORD) {
        sessionStorage.setItem(SESSION_KEY, "1");
        showAdmin();
      } else {
        document.getElementById("loginError").textContent = "Incorrect password. Try again.";
        document.getElementById("passwordInput").value = "";
      }
    }

    function logout() {
      sessionStorage.removeItem(SESSION_KEY);
      document.getElementById("adminApp").classList.remove("visible");
      document.getElementById("loginScreen").style.display = "flex";
    }

    function showAdmin() {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("adminApp").classList.add("visible");
      renderAdminProducts();
    }

    // Check session on load
    if (sessionStorage.getItem(SESSION_KEY) === "1") {
      showAdmin();
    }

    // ---- Product Management ----
    function getProducts() {
      return JSON.parse(localStorage.getItem("ls_extra_products")) || [];
    }
    function saveProducts(arr) {
      localStorage.setItem("ls_extra_products", JSON.stringify(arr));
    }

    function addProduct() {
      const name = document.getElementById("pName").value.trim();
      const brand = document.getElementById("pBrand").value.trim();
      const category = document.getElementById("pCategory").value;
      const price = document.getElementById("pPrice").value.trim();
      const image = document.getElementById("pImage").value.trim();
      const desc = document.getElementById("pDesc").value.trim();
      const notes = document.getElementById("pNotes").value.trim();
      const badge = document.getElementById("pBadge").value.trim();
      const msg = document.getElementById("formMsg");

      if (!name || !price || !image) {
        msg.textContent = "Name, price, and image are required.";
        msg.className = "form-msg error";
        return;
      }

      const products = getProducts();
      products.push({
        id: "custom_" + Date.now(),
        name, brand, category,
        price: Number(price),
        description: desc || "Premium fragrance",
        notes: notes ? notes.split(",").map(n => n.trim()) : [],
        images: [image],
        badge: badge || null
      });
      saveProducts(products);

      msg.textContent = `"${name}" added successfully!`;
      msg.className = "form-msg success";

      // Clear form
      ["pName","pBrand","pPrice","pImage","pDesc","pNotes","pBadge"].forEach(id => {
        document.getElementById(id).value = "";
      });

      renderAdminProducts();
      setTimeout(() => { msg.textContent = ""; }, 3000);
    }

    function deleteProduct(id) {
      if (!confirm("Delete this product?")) return;
      const products = getProducts().filter(p => p.id !== id);
      saveProducts(products);
      renderAdminProducts();
    }

    function renderAdminProducts() {
      const list = document.getElementById("adminProductList");
      const products = getProducts();
      document.getElementById("productCount").textContent = `${products.length} custom product${products.length !== 1 ? "s" : ""}`;

      if (products.length === 0) {
        list.innerHTML = `<div class="empty-state"><p>No custom products added yet.</p><p style="font-size:12px;margin-top:6px;opacity:0.6">Hardcoded products always show on the storefront.</p></div>`;
        return;
      }

      list.innerHTML = products.map(p => `
        <div class="admin-product-item">
          <img src="${p.images[0]}" alt="${p.name}" class="admin-product-img" onerror="this.style.display='none'">
          <div class="admin-product-info">
            <p class="admin-product-name">${p.name}</p>
            <p class="admin-product-meta">${p.brand} · ${p.category}</p>
          </div>
          <p class="admin-product-price">₦${Number(p.price).toLocaleString("en-NG")}</p>
          <button class="delete-btn" onclick="deleteProduct('${p.id}')">Delete</button>
        </div>
      `).join("");
    }
  </script>
</body>
</html>
